<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Controle de Gastos</title>
    <link
      href__="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- NAVBAR -->
    <header>
      <div class="navbar-container">
        <div class="navbar-brand">
          <div class="navbar-icon">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              height="20px"
              viewBox="0 -960 960 960"
              width="20px"
              fill="white"
            >
              <path
                d="M200-200v-560 560Zm0 80q-33 0-56.5-23.5T120-200v-560q0-33 23.5-56.5T200-840h560q33 0 56.5 23.5T840-760v100h-80v-100H200v560h560v-100h80v100q0 33-23.5 56.5T760-120H200Zm320-160q-33 0-56.5-23.5T440-360v-240q0-33 23.5-56.5T520-680h280q33 0 56.5 23.5T880-600v240q0 33-23.5 56.5T800-280H520Zm280-80v-240H520v240h280Zm-117.5-77.5Q700-455 700-480t-17.5-42.5Q665-540 640-540t-42.5 17.5Q580-505 580-480t17.5 42.5Q615-420 640-420t42.5-17.5Z"
              />
            </svg>
          </div>
          <div>
            <div class="navbar-title">Controle de Gastos</div>
            <div class="navbar-subtitle">Gerencie suas finanças</div>
          </div>
        </div>
      </div>
    </header>

    <main>
      <!-- STATS CARDS -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-card-header">
            <span class="stat-label">Total Gasto</span>
            <div class="stat-icon green">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                height="20px"
                viewBox="0 -960 960 960"
                width="20px"
                fill="#059669"
              >
                <path
                  d="m136-240-56-56 296-298 160 160 208-206H640v-80h240v240h-80v-104L536-320 376-480 136-240Z"
                />
              </svg>
            </div>
          </div>
          <div class="stat-value" id="totalGasto">R$ 0,00</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-header">
            <span class="stat-label">Este Mês</span>
            <div class="stat-icon blue">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                height="20px"
                viewBox="0 -960 960 960"
                width="20px"
                fill="#2563eb"
              >
                <path
                  d="M200-80q-33 0-56.5-23.5T120-160v-560q0-33 23.5-56.5T200-800h40v-80h80v80h320v-80h80v80h40q33 0 56.5 23.5T840-720v560q0 33-23.5 56.5T760-80H200Zm0-80h560v-400H200v400Zm0-480h560v-80H200v80Zm0 0v-80 80Zm280 240q-17 0-28.5-11.5T440-440q0-17 11.5-28.5T480-480q17 0 28.5 11.5T520-440q0 17-11.5 28.5T480-400Zm-188.5-11.5Q280-423 280-440t11.5-28.5Q303-480 320-480t28.5 11.5Q360-457 360-440t-11.5 28.5Q337-400 320-400t-28.5-11.5ZM640-400q-17 0-28.5-11.5T600-440q0-17 11.5-28.5T640-480q17 0 28.5 11.5T680-440q0 17-11.5 28.5T640-400ZM480-240q-17 0-28.5-11.5T440-280q0-17 11.5-28.5T480-320q17 0 28.5 11.5T520-280q0 17-11.5 28.5T480-240Zm-188.5-11.5Q280-263 280-280t11.5-28.5Q303-320 320-320t28.5 11.5Q360-297 360-280t-11.5 28.5Q337-240 320-240t-28.5-11.5ZM640-240q-17 0-28.5-11.5T600-280q0-17 11.5-28.5T640-320q17 0 28.5 11.5T680-280q0 17-11.5 28.5T640-240Z"
                />
              </svg>
            </div>
          </div>
          <div class="stat-value" id="mesAtual">R$ 0,00</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-header">
            <span class="stat-label">Registros</span>
            <div class="stat-icon violet">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                height="20px"
                viewBox="0 -960 960 960"
                width="20px"
                fill="#7c3aed"
              >
                <path
                  d="M240-80q-50 0-85-35t-35-85v-120h120v-560l60 60 60-60 60 60 60-60 60 60 60-60 60 60 60-60 60 60 60-60v680q0 50-35 85t-85 35H240Zm480-80q17 0 28.5-11.5T760-200v-560H320v440h360v120q0 17 11.5 28.5T720-160ZM360-600v-80h240v80H360Zm0 120v-80h240v80H360Zm320-120q-17 0-28.5-11.5T640-640q0-17 11.5-28.5T680-680q17 0 28.5 11.5T720-640q0 17-11.5 28.5T680-600Zm0 120q-17 0-28.5-11.5T640-520q0-17 11.5-28.5T680-560q17 0 28.5 11.5T720-520q0 17-11.5 28.5T680-480ZM240-160h360v-80H200v40q0 17 11.5 28.5T240-160Zm-40 0v-80 80Z"
                />
              </svg>
            </div>
          </div>
          <div class="stat-value" id="totalRegistros">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-card-header">
            <span class="stat-label">Categorias</span>
            <div class="stat-icon amber">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                height="20px"
                viewBox="0 -960 960 960"
                width="20px"
                fill="#d97706"
              >
                <path
                  d="M446-80q-15 0-30-6t-27-18L103-390q-12-12-17.5-26.5T80-446q0-15 5.5-30t17.5-27l352-353q11-11 26-17.5t31-6.5h287q33 0 56.5 23.5T879-800v287q0 16-6 30.5T856-457L503-104q-12 12-27 18t-30 6Zm0-80 353-354v-286H513L160-446l286 286Zm253-480q25 0 42.5-17.5T759-700q0-25-17.5-42.5T699-760q-25 0-42.5 17.5T639-700q0 25 17.5 42.5T699-640ZM480-480Z"
                />
              </svg>
            </div>
          </div>
          <div class="stat-value" id="totalCategorias">0</div>
        </div>
      </div>

      <!-- CONTENT GRID -->
      <div class="content-grid">
        <!-- LEFT COLUMN -->
        <div class="left-col">
          <div>
            <button id="novoGasto" class="btn-primary" onclick="novoGasto()">
              + Novo Gasto
            </button>
          </div>
          <!-- FORM -->
          <div id="card" class="card oculto">
            <div id="cardTitle" class="card-title">Novo Gasto</div>
            <div class="form-grid">
              <div class="form-group">
                <label for="nome">Nome</label>
                <input
                  type="text"
                  id="nome"
                  placeholder="Ex: Almoço, Uber..."
                />
                <div id="errorNome" class="error"></div>
              </div>
              <div class="form-group">
                <label for="valor">Valor (R$)</label>
                <input type="number" id="valor" placeholder="0,00" />
                <div id="errorValor" class="error"></div>
              </div>
              <div class="form-group">
                <label for="categoria">Categoria</label>
                <select id="categoria">
                  <option value="">Selecione...</option>
                  <option value="alimentacao">🍔 Alimentação</option>
                  <option value="transporte">🚗 Transporte</option>
                  <option value="moradia">🏠 Moradia</option>
                  <option value="saude">💊 Saúde</option>
                  <option value="educacao">📚 Educação</option>
                  <option value="lazer">🎮 Lazer</option>
                  <option value="vestuario">👕 Vestuário</option>
                  <option value="outros">📦 Outros</option>
                </select>
                <div id="errorCategoria" class="error"></div>
              </div>
              <div class="form-group">
                <label for="data">Data</label>
                <input type="date" id="data" />
                <div id="errorData" class="error"></div>
              </div>
            </div>
            <div class="form-actions">
              <button
                onclick="adicionarGasto()"
                id="btnAdicionar"
                class="btn-primary"
              >
                Adicionar
              </button>
              <button onclick="cancelar()" class="btn-outline">Cancelar</button>
            </div>
          </div>

          <!-- FILTER BAR -->
          <div>
            <div class="search-wrapper">
              <svg
                xmlns="http://www.w3.org/2000/svg"
                width="16"
                height="16"
                fill="none"
                viewBox="0 0 24 24"
                stroke="currentColor"
                stroke-width="2"
              >
                <circle cx="11" cy="11" r="8" />
                <path d="M21 21l-4.35-4.35" />
              </svg>
              <input
                class="search-input"
                type="text"
                placeholder="Buscar gasto..."
                id="pesquisa"
              />
            </div>
            <div class="filter-chips">
              <span
                ><svg
                  xmlns="http://www.w3.org/2000/svg"
                  height="24px"
                  viewBox="0 -960 960 960"
                  width="24px"
                  fill="gray"
                >
                  <path
                    d="M440-160q-17 0-28.5-11.5T400-200v-240L168-736q-15-20-4.5-42t36.5-22h560q26 0 36.5 22t-4.5 42L560-440v240q0 17-11.5 28.5T520-160h-80Zm40-308 198-252H282l198 252Zm0 0Z"
                  /></svg
              ></span>
              <button class="chip ativo" id="filtroTodas" data-cor="todas">
                Todas
              </button>
              <button
                class="chip"
                id="filtroAlimentacao"
                data-cor="alimentacao"
              >
                🍔 Alimentação
              </button>
              <button class="chip" id="filtroTransporte" data-cor="transporte">
                🚗 Transporte
              </button>
              <button class="chip" id="filtroMoradia" data-cor="moradia">
                🏠 Moradia
              </button>
              <button class="chip" id="filtroSaude" data-cor="saude">
                💊 Saúde
              </button>
              <button class="chip" id="filtroEducacao" data-cor="educacao">
                📚 Educação
              </button>
              <button class="chip" id="filtroLazer" data-cor="lazer">
                🎮 Lazer
              </button>
              <button class="chip" id="filtroVestuario" data-cor="vestuario">
                👕 Vestuário
              </button>
              <button class="chip" id="filtroOutros" data-cor="outros">
                📦 Outros
              </button>
            </div>
          </div>

          <!-- EXPENSE LIST -->
          <div>
            <div class="section-title">Gastos</div>
            <div id="listaDeGastos" class="expense-list"></div>
          </div>
        </div>

        <!-- RIGHT COLUMN -->
        <div class="right-col">
          <!-- CHART -->
          <div class="card">
            <div class="card-title">Gastos por Categoria</div>
            <div class="card-subtitle">Distribuição dos seus gastos</div>
            <div class="pie-placeholder">
              <canvas id="graficoGastos"></canvas>
              <div id="semLista" class="semListaDiv"></div>
            </div>
          </div>
        </div>
      </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="app.js"></script>
  </body>
</html>
